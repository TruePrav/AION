<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- Dark circle background -->
  <circle cx="32" cy="32" r="30" fill="#0a0f1e"/>
  <!-- Outer ring -->
  <circle cx="32" cy="32" r="22" fill="none" stroke="#a3e635" stroke-width="3"/>
  <!-- Inner ring -->
  <circle cx="32" cy="32" r="10" fill="none" stroke="#a3e635" stroke-width="2.5"/>
  <!-- Crosshair lines -->
  <line x1="32" y1="4" x2="32" y2="20" stroke="#a3e635" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="32" y1="44" x2="32" y2="60" stroke="#a3e635" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="4" y1="32" x2="20" y2="32" stroke="#a3e635" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="44" y1="32" x2="60" y2="32" stroke="#a3e635" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Center dot -->
  <circle cx="32" cy="32" r="2" fill="#a3e635"/>
</svg>
